name: Trending People Mail Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production mail cron
        run: |
          curl --fail --silent --show-error \
            "https://samsung-talent-pool-console.vercel.app/api/trending-mail-cron"
